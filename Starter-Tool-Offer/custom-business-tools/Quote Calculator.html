<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Quote Calculator</title>

  <style>
    :root {
      --cobalt: #155dfc;
      --cobalt-dark: #0f3fb0;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --success: #166534;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      background: var(--cobalt);
      color: white;
      padding: 28px;
      border-radius: 18px;
      margin-bottom: 24px;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    header p {
      margin: 0;
      opacity: 0.92;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
    }

    h2 {
      margin-top: 0;
      font-size: 20px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    .primary {
      background: var(--cobalt);
      color: white;
    }

    .primary:hover {
      background: var(--cobalt-dark);
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .quote-box {
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      min-height: 300px;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .total {
      color: var(--success);
      font-size: 24px;
      font-weight: 800;
      margin-top: 14px;
    }

    .note {
      color: var(--muted);
      font-size: 14px;
      margin-top: 12px;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .page {
        padding: 14px;
      }

      header {
        padding: 22px;
      }
    }

    @media print {
      body {
        background: white;
      }

      header,
      .input-card,
      .button-row,
      .note {
        display: none;
      }

      .page {
        max-width: 800px;
      }

      .card {
        box-shadow: none;
        border: none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <h1>Service Quote Calculator</h1>
      <p>Create quick, professional job estimates for small service businesses.</p>
    </header>

    <section class="grid">
      <div class="card input-card">
        <h2>Quote Details</h2>

        <label for="customerName">Customer Name</label>
        <input id="customerName" type="text" placeholder="Example: Sarah Johnson" />

        <label for="jobDescription">Job Description</label>
        <textarea id="jobDescription" placeholder="Example: Fence repair, cleanup, and haul-away"></textarea>

        <label for="laborHours">Labor Hours</label>
        <input id="laborHours" type="number" min="0" step="0.25" value="4" />

        <label for="hourlyRate">Hourly Rate ($)</label>
        <input id="hourlyRate" type="number" min="0" step="1" value="65" />

        <label for="materialsCost">Materials Cost ($)</label>
        <input id="materialsCost" type="number" min="0" step="1" value="120" />

        <label for="markupPercent">Markup (%)</label>
        <input id="markupPercent" type="number" min="0" step="1" value="20" />

        <label for="taxPercent">Tax (%)</label>
        <input id="taxPercent" type="number" min="0" step="0.1" value="7.5" />

        <div class="button-row">
          <button class="primary" onclick="calculateQuote()">Calculate Quote</button>
          <button class="secondary" onclick="clearForm()">Clear</button>
          <button class="secondary" onclick="window.print()">Print Quote</button>
        </div>

        <p class="note">
          Demo tool for custom small business quoting workflows.
        </p>
      </div>

      <div class="card">
        <h2>Quote Summary</h2>
        <div id="quoteOutput" class="quote-box">
Fill out the form and click Calculate Quote.
        </div>
      </div>
    </section>
  </main>

  <script>
    function money(value) {
      return Number(value || 0).toLocaleString('en-US', {
        style: 'currency',
        currency: 'USD'
      });
    }

    function getNumber(id) {
      return Number(document.getElementById(id).value) || 0;
    }

    function calculateQuote() {
      const customerName = document.getElementById('customerName').value.trim() || 'Customer';
      const jobDescription = document.getElementById('jobDescription').value.trim() || 'Service job';

      const laborHours = getNumber('laborHours');
      const hourlyRate = getNumber('hourlyRate');
      const materialsCost = getNumber('materialsCost');
      const markupPercent = getNumber('markupPercent');
      const taxPercent = getNumber('taxPercent');

      const laborTotal = laborHours * hourlyRate;
      const markupAmount = materialsCost * (markupPercent / 100);
      const materialsTotal = materialsCost + markupAmount;
      const subtotal = laborTotal + materialsTotal;
      const tax = subtotal * (taxPercent / 100);
      const grandTotal = subtotal + tax;

      document.getElementById('quoteOutput').innerHTML =
`SERVICE QUOTE

Customer:
${customerName}

Job Description:
${jobDescription}

Estimate Breakdown:
Labor: ${laborHours} hrs × ${money(hourlyRate)} = ${money(laborTotal)}
Materials: ${money(materialsCost)}
Materials Markup: ${markupPercent}% = ${money(markupAmount)}

Subtotal: ${money(subtotal)}
Tax: ${taxPercent}% = ${money(tax)}

TOTAL ESTIMATE:
${money(grandTotal)}

Prepared:
${new Date().toLocaleDateString()}`;
    }

    function clearForm() {
      document.getElementById('customerName').value = '';
      document.getElementById('jobDescription').value = '';
      document.getElementById('laborHours').value = '';
      document.getElementById('hourlyRate').value = '';
      document.getElementById('materialsCost').value = '';
      document.getElementById('markupPercent').value = '';
      document.getElementById('taxPercent').value = '';
      document.getElementById('quoteOutput').textContent = 'Fill out the form and click Calculate Quote.';
    }

    calculateQuote();
  </script>
</body>
</html>
